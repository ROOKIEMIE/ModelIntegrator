server:
  address: ":8080"
  static_dir: "./resources/web"
  read_timeout_seconds: 15
  write_timeout_seconds: 30
  shutdown_timeout_seconds: 10

log:
  level: "info"
  format: "text"

storage:
  sqlite_path: "./resources/config/controller.db"
  model_root_dir: "./resources/models"

auth:
  token: ""

integrations:
  lmstudio:
    enabled: true
    endpoint: "http://192.168.50.241:1234"
    token: ""
    cache_enabled: true
    cache_refresh_seconds: 30
  docker:
    enabled: true
    endpoint: "unix:///var/run/docker.sock"
    token: ""
  portainer:
    enabled: true
    endpoint: "http://portainer:9000"
    token: ""

nodes:
  - description: "Linux Server"
    type: "linux"
    host: "192.168.50.102"
    status: "online"
    last_seen_at: "2026-03-09T00:00:00Z"
    runtimes:
      - type: "docker"
        endpoint: "unix:///var/run/docker.sock"
        enabled: true
      - type: "portainer"
        endpoint: "http://portainer:9000"
        enabled: true

  - description: "Mac mini M4 Pro"
    type: "mac"
    host: "192.168.50.241"
    status: "online"
    last_seen_at: "2026-03-09T00:00:00Z"
    runtimes:
      - type: "lmstudio"
        endpoint: "http://192.168.50.241:1234"
        enabled: true

models: []

runtime_templates:
  - id: "docker-generic-local"
    name: "Docker Generic Local"
    description: "示例：本地通用 Docker 模型运行模板"
    runtime_type: "docker"
    image: "ubuntu:22.04"
    command:
      - "sleep"
      - "infinity"
    volumes:
      - "./resources/models:/models:ro"
    needs_gpu: false
