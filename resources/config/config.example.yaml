server:
  address: ":8080"
  static_dir: "./resources/web"
  read_timeout_seconds: 15
  write_timeout_seconds: 30
  shutdown_timeout_seconds: 10

log:
  level: "info"
  format: "text"

storage:
  sqlite_path: "./resources/config/controller.db"
  model_root_dir: "./resources/models"

testing:
  log_root_dir: "./testsystem/logs"

auth:
  token: ""

controller:
  node_id: "node-controller"
  node_name: "Controller Node"
  node_host: "192.168.50.102"
  # 阶段 A：controller node 同时作为 managed node，默认走 local-agent-first 执行路径。
  local_agent_expected: true
  local_agent_id: "agent-controller-local"

integrations:
  lmstudio:
    enabled: true
    endpoint: "http://192.168.50.241:1234"
    token: ""
    cache_enabled: true
    cache_refresh_seconds: 30
  docker:
    enabled: true
    endpoint: "unix:///var/run/docker.sock"
    token: ""
  portainer:
    enabled: true
    endpoint: "http://portainer:9000"
    token: ""

nodes:
  - id: "node-controller"
    name: "Controller Node"
    role: "controller"
    description: "Controller Node（同时是 managed node，建议运行本机 agent）"
    type: "linux"
    host: "192.168.50.102"
    status: "online"
    last_seen_at: "2026-03-09T00:00:00Z"
    metadata:
      managed_node: "true"
      controller_node: "true"
      local_agent_expected: "true"
      preferred_local_agent_id: "agent-controller-local"
    runtimes:
      - id: "rt-controller-docker"
        type: "docker"
        endpoint: "unix:///var/run/docker.sock"
        enabled: true
      - id: "rt-controller-portainer"
        type: "portainer"
        endpoint: "http://portainer:9000"
        enabled: true

  - id: "node-managed-mac-mini"
    name: "Managed Node 1"
    role: "managed"
    description: "Mac mini M4 Pro（远端 managed node）"
    type: "mac"
    host: "192.168.50.241"
    status: "online"
    last_seen_at: "2026-03-09T00:00:00Z"
    metadata:
      managed_node: "true"
    runtimes:
      - id: "rt-mac-lmstudio"
        type: "lmstudio"
        endpoint: "http://192.168.50.241:1234"
        enabled: true

models:
  - id: "local-multilingual-e5-base"
    name: "multilingual-e5-base"
    provider: "localfs"
    backend_type: "docker"
    host_node_id: "node-controller"
    runtime_id: "rt-controller-docker"
    endpoint: "http://127.0.0.1:58001"
    state: "stopped"
    desired_state: "stopped"
    observed_state: "unknown"
    readiness: "unknown"
    context_length: 512
    metadata:
      source: "config"
      runtime_template_id: "tei-embedding-e5-local"
      embedding_dimension: "768"
      path: "./resources/models/multilingual-e5-base"
      runtime_endpoint: "unix:///var/run/docker.sock"

runtime_templates:
  - id: "docker-generic-local"
    name: "Docker Generic Local"
    description: "示例：本地通用 Docker 模型运行模板"
    runtime_type: "docker"
    image: "ubuntu:22.04"
    command:
      - "sleep"
      - "infinity"
    volumes:
      - "./resources/models:/models:ro"
    needs_gpu: false
  - id: "tei-embedding-e5-local"
    name: "TEI Embedding E5 Local"
    description: "E5 embedding 样板模板，优先用于 local-multilingual-e5-base"
    runtime_type: "docker"
    image: "ghcr.io/huggingface/text-embeddings-inference:cpu-latest"
    command:
      - "--model-id"
      - "{{MODEL_PATH_CONTAINER}}"
      - "--port"
      - "80"
    volumes:
      - "./resources/models:/models:ro"
    ports:
      - "58001:80"
    needs_gpu: false
    metadata:
      category: "embedding"
